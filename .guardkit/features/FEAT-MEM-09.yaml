id: FEAT-MEM-09
name: Decommission Graphiti / drop Qwen2.5 — fleet-wide migration + FalkorDB teardown
description: >-
  Migrate all Graphiti/FalkorDB knowledge (11.8k nodes / 92 graphs / ~18 projects) to the
  fleet-memory pure-embeddings backend, migrate the 5 real code consumers, then drop the
  Qwen2.5 extraction LLM and decommission FalkorDB. Operator chose the full fleet teardown,
  gated on an investigation (DONE). Design + evidence:
  docs/design/specs/memory-cutover/FEAT-MEM-09-fleet-migration-investigation.md;
  consumer disposition: docs/design/specs/memory-cutover/FEAT-MEM-09-consumer-disposition-map.md.
  Locked decisions: (fact fidelity) hybrid = chunk-level everywhere + one-time offline
  cloud-LLM distillation of the ~274 high-value guardkit nodes (NO runtime LLM);
  (teardown safety) raw FalkorDB dump + keep dormant N months before the one-way door;
  (unique nodes) promote the valuable doc-less runtime lessons into git-versioned
  .claude/rules//docs/decisions/ + distill; (per-project) fleet-memory already scopes by
  project at the SQL level — guardkit just unhardcodes "guardkit".
