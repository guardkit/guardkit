# Threads `uv pip install -e .[dev,memory]` into every wave's isolated worktree venv.
# `memory` installs the editable ../nats-core sibling (declared in [tool.uv.sources] +
# the `memory` extra in pyproject.toml) so `import nats_core` resolves in waves 2-5.
# `dev` is REQUIRED here: an operator-declared bootstrap_extras suppresses the
# Coach-needs-pytest auto-add, so omitting it would strip pytest from the worktree venv
# and break the Coach independent-test gate. (Verified: env_bootstrap derive_bootstrap_extras.)
bootstrap_extras:
- dev
- memory
# Feature-level smoke gate (R3): after the CLI wave (wave 3 = TASK-HARV-005), run the
# assembled walker→CLI dry-run. Catches composition/import failures the per-task Coach
# misses, with NO live broker (--dry-run short-circuits before any NATS connect /
# GUARDKIT_NATS_PASSWORD read). `python -m guardkit.cli.main` is robust against
# console-script PATH uncertainty (editable package + venv python on PATH).
smoke_gates:
  after_wave: 3
  command: python -m guardkit.cli.main memory harvest --dry-run
  expected_exit: 0
  timeout: 180
