# The `memory` extra pulls fleet-memory (reads, TASK-MEM08-011) which requires
# Python >=3.12, but guardkit is >=3.11 so the bootstrap would build a 3.11 venv
# that cannot host fleet-memory. Pin the worktree interpreter to 3.12 when
# (re-)running autobuild for this feature:
#   GUARDKIT_BOOTSTRAP_PYTHON=3.12 guardkit autobuild feature FEAT-MEM-08 [--resume]
# (env_bootstrap honours GUARDKIT_BOOTSTRAP_PYTHON over the requires-python floor).
